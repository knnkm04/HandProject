<!DOCTYPE html>
<html>
<head>
    <title>Pantone Pro-Smooth JS (Final Edition)</title>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .window-frame { width: 360px; height: 640px; background: #000; position: relative; border-radius: 10px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.8); border: 1px solid #333; }
        #webcam { visibility: hidden; position: absolute; }
        #canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="window-frame">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});

    let lastFacePos = { x: 0, y: 0 };
    let smoothFactor = 0.85; 
    let resultsFace = null;
    let resultsHand = null;

    // --- Mediapipe Setup ---
    const faceDetection = new FaceDetection({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
    });
    faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
    faceDetection.onResults(r => { resultsFace = r; });

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(r => { resultsHand = r; });

    async function process() {
        if (video.readyState < 2) { requestAnimationFrame(process); return; }
        
        canvas.width = 360;
        canvas.height = 640;
        
        ctx.save();
        
        // 1. คำนวณการ Crop (9:16)
        const videoAspect = video.videoWidth / video.videoHeight;
        const targetAspect = 9 / 16;
        let drawW, drawH, sx, sy;
        
        if (videoAspect > targetAspect) {
            drawH = video.videoHeight; drawW = drawH * targetAspect;
            sx = (video.videoWidth - drawW) / 2; sy = 0;
        } else {
            drawW = video.videoWidth; drawH = drawW / targetAspect;
            sx = 0; sy = (video.videoHeight - drawH) / 2;
        }

        // วาดภาพ Mirror
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, sx, sy, drawW, drawH, 0, 0, canvas.width, canvas.height);
        
        // --- ฟังก์ชันแก้พิกัดให้ตรงเป๊ะ (Crop + Mirror) ---
        const fixCoords = (landmark) => {
            let vx = landmark.x * video.videoWidth;
            let vy = landmark.y * video.videoHeight;
            // หักลบส่วนที่ Crop และ Scale ให้เท่า Canvas
            let cx = (vx - sx) / drawW * canvas.width;
            let cy = (vy - sy) / drawH * canvas.height;
            // กลับด้าน X เพราะเรา Mirror ภาพไว้
            return { x: canvas.width - cx, y: cy };
        };

        // --- Debug: วาดจุดมาร์กมือ (แก้ไขพิกัดให้ตรง) ---
        if (resultsHand && resultsHand.multiHandLandmarks) {
            for (const landmarks of resultsHand.multiHandLandmarks) {
                const correctedLms = landmarks.map(lm => fixCoords(lm));
                drawConnectors(ctx, correctedLms, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                drawLandmarks(ctx, correctedLms, {color: '#FF0000', lineWidth: 1});

                // จุดกึ่งกลางนิ้วชี้ (8) และนิ้วโป้ง (3) ที่คำนวณใหม่
                const p1 = correctedLms[8];
                const p2 = correctedLms[3];
                const midX = (p1.x + p2.x) / 2;
                const midY = (p1.y + p2.y) / 2;

                ctx.fillStyle = "yellow";
                ctx.beginPath(); ctx.arc(midX, midY, 8, 0, Math.PI * 2); ctx.fill();
            }
        }

        // --- Debug: วาดจุดมาร์กหน้า (แก้ไขพิกัดให้ตรง) ---
        if (resultsFace && resultsFace.detections) {
            for (const detection of resultsFace.detections) {
                const keypoints = detection?.locationData?.relativeKeypoints;
                if (keypoints) {
                    const correctedKp = keypoints.map(kp => fixCoords(kp));
                    drawLandmarks(ctx, correctedKp, {color: '#FFFFFF', lineWidth: 2});
                }
            }
        }
        ctx.restore(); 

        // 2. ลอจิกการวาดการ์ด Pantone (แปะจมูก)
        const avgColor = getAvgColor(ctx);
        const hexCode = rgbToHex(avgColor);

        if (resultsFace && resultsFace.detections && resultsFace.detections.length > 0) {
            const detection = resultsFace.detections[0];
            const keypoints = detection?.locationData?.relativeKeypoints;
            if (keypoints && keypoints[2]) {
                const nosePos = fixCoords(keypoints[2]); // ใช้ฟังก์ชันแก้พิกัดตัวเดียวกัน
                
                lastFacePos.x = lastFacePos.x * smoothFactor + nosePos.x * (1 - smoothFactor);
                lastFacePos.y = lastFacePos.y * smoothFactor + nosePos.y * (1 - smoothFactor);

                const bBox = detection.locationData.relativeBoundingBox;
                const faceW = bBox ? bBox.width * canvas.width : 150;
                drawPantonePro(ctx, lastFacePos.x, lastFacePos.y, faceW, avgColor, hexCode);
            }
        }

        drawWinBar(ctx, canvas.width);
        requestAnimationFrame(process);
    }

    function getAvgColor(c) {
        try {
            const d = c.getImageData(10, 60, 30, 30).data;
            let r=0, g=0, b=0;
            for(let i=0; i<d.length; i+=4) { r+=d[i]; g+=d[i+1]; b+=d[i+2]; }
            const n = d.length/4;
            return [Math.floor(r/n), Math.floor(g/n), Math.floor(b/n)];
        } catch(e) { return [0,0,0]; }
    }

    function rgbToHex(rgb) {
        return "#" + rgb.map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    function drawPantonePro(c, x, y, faceW, color, hex) {
        const scale = faceW / 180;
        const w = 160 * scale;
        const h = 160 * scale;
        const x1 = x - w/2, y1 = y - h/2 - (50 * scale);
        
        c.save();
        c.shadowBlur = 15; c.shadowColor = "rgba(0,0,0,0.3)";
        c.fillStyle = "white";
        c.fillRect(x1 - 6, y1 - 6, w + 12, h + 75 * scale);
        c.shadowBlur = 0;
        
        c.fillStyle = `rgb(${color[0]},${color[1]},${color[2]})`;
        c.fillRect(x1, y1, w, h);

        c.fillStyle = "black";
        c.font = `bold ${Math.max(12, 18 * scale)}px Arial`;
        c.fillText("PANTONE", x1 + 10 * scale, y1 + h + 28 * scale);
        c.fillStyle = "#444";
        c.font = `${Math.max(10, 14 * scale)}px Arial`;
        c.fillText(hex, x1 + 10 * scale, y1 + h + 48 * scale);
        c.restore();
    }
    function applyAdvancedFilters(c, h, w, h_img) {
        const lms = h.multiHandLandmarks;
        if (!lms || lms.length < 1) return;
        
        const hand = lms[0];
        const videoW = video.videoWidth;
        const videoH = video.videoHeight;
        const targetAspect = 9 / 16;
        let dW, dH, sX, sY;

        if (videoW / videoH > targetAspect) {
            dH = videoH; dW = dH * targetAspect;
            sX = (videoW - dW) / 2; sY = 0;
        } else {
            dW = videoW; dH = dW / targetAspect;
            sX = 0; sY = (videoH - dH) / 2;
        }

        // --- จุดสำคัญ: ไม่ต้องใช้ w - cx แล้ว เพราะ Canvas mirror ให้แล้ว ---
        const getXY = (lm) => {
            let cx = ((lm.x * videoW) - sX) / dW * w;
            let cy = ((lm.y * videoH) - sY) / dH * h_img;
            return { x: cx, y: cy }; 
        };

        const p1 = getXY(hand[8]); // นิ้วชี้
        const p2 = getXY(hand[3]); // นิ้วโป้ง
        const midX = (p1.x + p2.x) / 2;
        const midY = (p1.y + p2.y) / 2;

        // วาดจุดและฟิลเตอร์ (ต้องวาดก่อน ctx.restore() ในฟังก์ชัน process)
        c.save();
        // เนื่องจาก ctx ใน process มีการ scale(-1, 1) ไว้ 
        // เราต้องวาดจุดกึ่งกลางและฟิลเตอร์ที่นี่เลย
        c.fillStyle = "yellow";
        c.beginPath();
        c.arc(midX, midY, 8, 0, Math.PI * 2);
        c.fill();

        const areaSize = 120;
        let fx = midX - (areaSize / 2);
        let fy = midY - (areaSize / 2);

        try {
            let imgData = c.getImageData(fx, fy, areaSize, areaSize);
            let d = imgData.data;
            for(let i=0; i<d.length; i+=4) {
                d[i]=255-d[i]; d[i+1]=255-d[i+1]; d[i+2]=255-d[i+2];
            }
            c.putImageData(imgData, fx, fy);
        } catch(e) {}
        c.restore(); 
    }
    function drawWinBar(c, w) {
        c.fillStyle = "#1c1c1c";
        c.fillRect(0, 0, w, 45);
        c.fillStyle = "#999";
        c.font = "13px Segoe UI";
        c.fillText("PANTONE PRO-SMOOTH JS", 15, 28);
        
        const colors = ["#ff5f56", "#ffbd2e", "#27c93f"];
        colors.reverse().forEach((col, i) => {
            c.fillStyle = col;
            c.beginPath(); c.arc(w - 20 - (i*22), 22, 6, 0, Math.PI*2); c.fill();
        });
    }

    const camera = new Camera(video, {
        onFrame: async () => {
            if(faceDetection) await faceDetection.send({image: video});
            if(hands) await hands.send({image: video});
        },
        width: 640, height: 480
    });
    camera.start();
    video.addEventListener('loadedmetadata', process);

</script>
</body>
</html>
