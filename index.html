<!DOCTYPE html>
<html>
<head>
    <title>Pantone Pro-Smooth JS (Final Edition)</title>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .window-frame { width: 360px; height: 640px; background: #000; position: relative; border-radius: 10px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.8); border: 1px solid #333; }
        #webcam { visibility: hidden; position: absolute; }
        #canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="window-frame">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});

    let lastFacePos = { x: 0, y: 0 };
    let smoothFactor = 0.85; 
    let resultsFace = null;
    let resultsHand = null;

    // --- Mediapipe Setup ---
    const faceDetection = new FaceDetection({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
    });
    faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
    faceDetection.onResults(r => { resultsFace = r; });

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(r => { resultsHand = r; });

    async function process() {
        if (video.readyState < 2) { requestAnimationFrame(process); return; }
        
        canvas.width = 360;
        canvas.height = 640;
        
        ctx.save();
        
        // 1. วาดภาพจากกล้อง (Crop 9:16)
        const videoAspect = video.videoWidth / video.videoHeight;
        const targetAspect = 9 / 16;
        let drawW, drawH, sx, sy;
        
        if (videoAspect > targetAspect) {
            drawH = video.videoHeight; drawW = drawH * targetAspect;
            sx = (video.videoWidth - drawW) / 2; sy = 0;
        } else {
            drawW = video.videoWidth; drawH = drawW / targetAspect;
            sx = 0; sy = (video.videoHeight - drawH) / 2;
        }

        // Mirror ภาพพื้นหลัง
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, sx, sy, drawW, drawH, 0, 0, canvas.width, canvas.height);
        
        // --- Debug: วาดจุดมาร์กมือ ---
        if (resultsHand && resultsHand.multiHandLandmarks) {
            for (const landmarks of resultsHand.multiHandLandmarks) {
                drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                drawLandmarks(ctx, landmarks, {color: '#FF0000', lineWidth: 1});
            }
        }

        // --- Debug: วาดจุดมาร์กหน้า ---
        if (resultsFace && resultsFace.detections) {
            for (const detection of resultsFace.detections) {
                drawRectangle(ctx, detection.locationData.relativeBoundingBox, {color: '#0000FF', lineWidth: 2});
                const keypoints = detection.locationData.relativeKeypoints;
                if (keypoints) {
                    drawLandmarks(ctx, keypoints, {color: '#FFFFFF', lineWidth: 2});
                }
            }
        }
        ctx.restore(); 

        // 2. คำนวณสีและการ์ด Pantone
        const avgColor = getAvgColor(ctx);
        const hexCode = rgbToHex(avgColor);

        // ฟิลเตอร์มือ
        if (resultsHand && resultsHand.multiHandLandmarks && resultsHand.multiHandLandmarks.length === 2) {
            applyAdvancedFilters(ctx, resultsHand, canvas.width, canvas.height);
        }

        // วาดการ์ด Pantone (แปะจมูก)
        if (resultsFace && resultsFace.detections && resultsFace.detections.length > 0) {
            const detection = resultsFace.detections[0];
            const keypoints = detection?.locationData?.relativeKeypoints;
            
            if (keypoints && keypoints[2]) {
                const nose = keypoints[2];
                let nx = (1 - nose.x) * canvas.width; 
                let ny = nose.y * canvas.height;

                lastFacePos.x = lastFacePos.x * smoothFactor + nx * (1 - smoothFactor);
                lastFacePos.y = lastFacePos.y * smoothFactor + ny * (1 - smoothFactor);

                const bBox = detection.locationData.relativeBoundingBox;
                const faceW = bBox ? bBox.width * canvas.width : 150;
                drawPantonePro(ctx, lastFacePos.x, lastFacePos.y, faceW, avgColor, hexCode);
            }
        }

        drawWinBar(ctx, canvas.width);
        requestAnimationFrame(process);
    }

    function getAvgColor(c) {
        try {
            const d = c.getImageData(10, 60, 30, 30).data;
            let r=0, g=0, b=0;
            for(let i=0; i<d.length; i+=4) { r+=d[i]; g+=d[i+1]; b+=d[i+2]; }
            const n = d.length/4;
            return [Math.floor(r/n), Math.floor(g/n), Math.floor(b/n)];
        } catch(e) { return [0,0,0]; }
    }

    function rgbToHex(rgb) {
        return "#" + rgb.map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    function drawPantonePro(c, x, y, faceW, color, hex) {
        const scale = faceW / 180;
        const w = 160 * scale;
        const h = 160 * scale;
        const x1 = x - w/2, y1 = y - h/2 - (50 * scale);
        
        c.save();
        c.shadowBlur = 15; c.shadowColor = "rgba(0,0,0,0.3)";
        c.fillStyle = "white";
        c.fillRect(x1 - 6, y1 - 6, w + 12, h + 75 * scale);
        c.shadowBlur = 0;
        
        c.fillStyle = `rgb(${color[0]},${color[1]},${color[2]})`;
        c.fillRect(x1, y1, w, h);

        c.fillStyle = "black";
        c.font = `bold ${Math.max(12, 18 * scale)}px Arial`;
        c.fillText("PANTONE", x1 + 10 * scale, y1 + h + 28 * scale);
        c.fillStyle = "#444";
        c.font = `${Math.max(10, 14 * scale)}px Arial`;
        c.fillText(hex, x1 + 10 * scale, y1 + h + 48 * scale);
        c.restore();
    }

    function applyAdvancedFilters(c, h, w, h_img) {
        const lms = h.multiHandLandmarks;
        if (lms.length < 2) return;
        
        const l1 = lms[0][0];
        const l2 = lms[1][0];
        const label = h.multiHandedness[0].label;

        let x1 = Math.min(1-l1.x, 1-l2.x) * w;
        let x2 = Math.max(1-l1.x, 1-l2.x) * w;
        let y1 = Math.min(l1.y, l2.y) * h_img;
        let y2 = Math.max(l1.y, l2.y) * h_img;

        if (x2 - x1 < 20 || y2 - y1 < 20) return;

        try {
            let imgData = c.getImageData(x1, y1, x2-x1, y2-y1);
            let d = imgData.data;
            const isLeftHigher = (label === 'Left' ? l1.y : l2.y) < (label === 'Right' ? l1.y : l2.y);

            if (isLeftHigher) {
                for(let i=0; i<d.length; i+=4) { d[i]=255-d[i]; d[i+1]=255-d[i+1]; d[i+2]=255-d[i+2]; }
            } else {
                const shift = 20;
                for(let i=0; i<d.length; i+=4) {
                    if(i + shift*4 < d.length) {
                        d[i] = d[i + shift*4];
                        d[i+2] = d[Math.max(0, i - shift*4 + 2)];
                    }
                }
            }
            c.putImageData(imgData, x1, y1);
        } catch(e) {}
    }

    function drawWinBar(c, w) {
        c.fillStyle = "#1c1c1c";
        c.fillRect(0, 0, w, 45);
        c.fillStyle = "#999";
        c.font = "13px Segoe UI";
        c.fillText("PANTONE PRO-SMOOTH JS", 15, 28);
        
        const colors = ["#ff5f56", "#ffbd2e", "#27c93f"];
        colors.reverse().forEach((col, i) => {
            c.fillStyle = col;
            c.beginPath(); c.arc(w - 20 - (i*22), 22, 6, 0, Math.PI*2); c.fill();
        });
    }

    const camera = new Camera(video, {
        onFrame: async () => {
            if(faceDetection) await faceDetection.send({image: video});
            if(hands) await hands.send({image: video});
        },
        width: 640, height: 480
    });
    camera.start();
    video.addEventListener('loadedmetadata', process);

</script>
</body>
</html>
