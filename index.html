<!DOCTYPE html>
<html>
<head>
    <title>Pantone Pro-Smooth JS (GitHub Edition)</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            /* ใช้ min-height เพื่อรองรับแถบ Address bar บนมือถือ */
            min-height: 100vh; 
            min-height: -webkit-fill-available; 
            overflow: hidden; 
        }
        .window-frame { 
            /* เปลี่ยนจาก 360px/640px เป็นเต็มหน้าจอ */
            width: 100vw; 
            height: 100vh; 
            height: -webkit-fill-available;
            background: #000; 
            position: relative; 
            overflow: hidden; 
        }
        #webcam { visibility: hidden; position: absolute; }
        #canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <button id="toggleBtn" style="position: absolute; top: 10px; right: 10px; z-index: 101; padding: 8px 12px; background: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
        HIDE SETTINGS
    </button>
<div style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 8px; font-family: monospace; z-index: 100; width: 220px;">
    <div id="controlPanel" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.85); color: white; padding: 15px; border-radius: 8px; font-family: monospace; z-index: 100; width: 220px; padding-top: 50px;">
        <strong>🎛️ TUNING PANEL</strong><br><br>
        Smoothing: <span id="smoothVal">0.95</span><br>
        <input type="range" id="smoothSlider" min="0.70" max="0.99" step="0.01" value="0.95" style="width: 100%;"><br><br>
        
        Scale Factor: <span id="scaleVal">300</span><br>
        <input type="range" id="scaleSlider" min="50" max="300" step="10" value="100" style="width: 100%;"><br><br>
        
        Confidence: <span id="confVal">0.7</span><br>
        <input type="range" id="confSlider" min="0.1" max="0.9" step="0.1" value="0.7" style="width: 100%;">
    </div>   
</div>
<div class="window-frame">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const APP_VERSION = "1.11.1"; // แก้เลขตรงนี้ทุกครั้งที่ Commit/Push ขึ้น GitHub
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});

    let resultsFace = null;
    let resultsHand = null;
    let prev_nx = 0, prev_ny = 0;
    let firstFrame = true;

    // --- Mediapipe Setup ---
    const faceDetection = new FaceDetection({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
    });
    faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.4 });
    faceDetection.onResults(r => { resultsFace = r; });

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
    hands.onResults(r => { resultsHand = r; });

    // --- Logic functions ---
    function rgbToHex(r, g, b) {
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
    }

    async function process() {
        if (video.readyState < 2) { requestAnimationFrame(process); return; }
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 1. คำนวณ Crop 9:16 (อิงจาก Python: target_w = h * 9/16)
        const videoAspect = video.videoWidth / video.videoHeight;
        const targetAspect = canvas.width / canvas.height;
        let drawW, drawH, sx, sy;
        
        if (videoAspect > targetAspect) {
            drawH = video.videoHeight; drawW = drawH * targetAspect;
            sx = (video.videoWidth - drawW) / 2; sy = 0;
        } else {
            drawW = video.videoWidth; drawH = drawW / targetAspect;
            sx = 0; sy = (video.videoHeight - drawH) / 2;
        }

        ctx.save();
        // Mirror ภาพ (cv2.flip(frame, 1))
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, sx, sy, drawW, drawH, 0, 0, canvas.width, canvas.height);

        // ฟังก์ชันแปลงพิกัด (เทียบเท่าการคูณ target_w และ h ใน Python)// สูตรนี้จะทำให้พิกัด AI สอดคล้องกับภาพ Mirror บนหน้าจอ
        const fixX = (x) => canvas.width - (((x * video.videoWidth) - sx) / drawW * canvas.width);
        const fixY = (y) => ((y * video.videoHeight) - sy) / drawH * canvas.height;

        // 2. ดึงสีเฉากหลัง (ROI 0:50, 0:50)
        const sampleData = ctx.getImageData(10, 55, 30, 30).data; // ขยับลงมาใต้ Bar นิดหน่อย
        let r_sum=0, g_sum=0, b_sum=0;
        for(let i=0; i<sampleData.length; i+=4) {
            r_sum += sampleData[i]; g_sum += sampleData[i+1]; b_sum += sampleData[i+2];
        }
        const n = sampleData.length / 4;
        const avgR = Math.floor(r_sum/n), avgG = Math.floor(g_sum/n), avgB = Math.floor(b_sum/n);
        const hexCode = rgbToHex(avgR, avgG, avgB);

        // 3. วาดการ์ด Pantone (Face Detection)
        if (resultsFace && resultsFace.detections && resultsFace.detections.length > 0) {
        // ลองเปลี่ยนวิธีดึงข้อมูลดูว่ามีอะไรมาบ้าง
        const det = resultsFace.detections[0];
        const bbox = det.boundingBox || det.locationData?.relativeBoundingBox;
        const kp = det.landmarks || det.locationData?.relativeKeypoints;
            if (kp && kp[2] && bbox) {
                let nx = (((kp[2].x * video.videoWidth) - sx) / drawW * canvas.width);
                let ny = fixY(kp[2].y);

                // เช็คเฟรมแรกเพื่อกระโดดไปหาพิกัดหน้าทันที
                if (firstFrame || (prev_nx === 0 && prev_ny === 0)) { 
                    prev_nx = nx; 
                    prev_ny = ny; 
                    firstFrame = false; 
                }

                // การคำนวณ Smoothing 0.85
                // เปลี่ยนบรรทัด Smoothing เป็นแบบนี้
                prev_nx = (prev_nx * currentSmooth) + (nx * (1 - currentSmooth));
                prev_ny = (prev_ny * currentSmooth) + (ny * (1 - currentSmooth));
                
                // เปลี่ยนบรรทัด Scale เป็นแบบนี้
                const scale = (bbox.width * canvas.width) / currentScaleFactor;
                const x_half = 100 * scale, y_half = 100 * scale, offset_up = 70 * scale;
                const border = 15 * scale;

                // --- วาด Pantone ---
                ctx.fillStyle = "white";
                ctx.fillRect(prev_nx - x_half - border, prev_ny - y_half - offset_up - border, (x_half*2) + (border*2), (y_half*2) + (130 * scale));
                
                ctx.fillStyle = `rgb(${avgR},${avgG},${avgB})`;
                ctx.fillRect(prev_nx - x_half, prev_ny - y_half - offset_up, x_half*2, y_half*2);

                // วาด Text (Mirror Back)
                ctx.save();
                ctx.scale(-1, 1);
                ctx.fillStyle = "black";
                ctx.textAlign = "left"; // บังคับชิดซ้าย
// พิกัด X สำหรับข้อความ (คำนวณให้ตรงกับขอบซ้ายของช่องสี)
                const textPosX = -(prev_nx + x_half); 
                const startY = prev_ny + y_half - offset_up;
                
// 1. คำว่า PANTONE
                ctx.font = `bold ${22 * scale}px sans-serif`;
                ctx.fillText("PANTONE®", textPosX, startY + 35 * scale);
                
                // 2. โค้ดสี HEX
                ctx.font = `bold ${18 * scale}px monospace`;
                ctx.fillText(hexCode, textPosX, startY + 65 * scale);
                
                // 3. ค่า RGB
                ctx.font = `${12 * scale}px monospace`;
                ctx.fillText(`RGB: ${avgR}, ${avgG}, ${avgB}`, textPosX, startY + 88 * scale);
                
                ctx.restore();
            } // ปิด if (kp && kp[2] && bbox)
        } // ปิด if (resultsFace...)


        // --- 4. ฟิลเตอร์มือ (แก้ไขใหม่) ---
        if (resultsHand && resultsHand.multiHandLandmarks && resultsHand.multiHandLandmarks.length === 2) {
            const hands = resultsHand.multiHandLandmarks;
            
            // หาจุดกึ่งกลางของมือทั้งสอง (คำนวณแบบ Screen Space)
            const c0 = { x: fixX((hands[0][2].x + hands[0][5].x) / 2), y: fixY((hands[0][2].y + hands[0][5].y) / 2) };
            const c1 = { x: fixX((hands[1][2].x + hands[1][5].x) / 2), y: fixY((hands[1][2].y + hands[1][5].y) / 2) };
        
            const mx1 = Math.floor(Math.max(0, Math.min(c0.x, c1.x)));
            const mx2 = Math.floor(Math.min(canvas.width, Math.max(c0.x, c1.x)));
            const my1 = Math.floor(Math.max(0, Math.min(c0.y, c1.y)));
            const my2 = Math.floor(Math.min(canvas.height, Math.max(c0.y, c1.y)));
        
            if (mx2 - mx1 > 20 && my2 - my1 > 20) {
                try {
                    const roiData = ctx.getImageData(mx1, my1, mx2 - mx1, my2 - my1);
                    const d = roiData.data;
        
                    // เทียบจากพิกัด X: ใครอยู่เลขน้อยกว่า (ซ้ายจอ)
                    const leftHandIndex = c0.x < c1.x ? 0 : 1;
                    const rightHandIndex = c0.x < c1.x ? 1 : 0;
        
                    // เช็คความสูง (Y): ถ้ามือที่อยู่ฝั่งซ้ายจอ อยู่สูงกว่ามือฝั่งขวาจอ
                    if (hands[leftHandIndex][0].y < hands[rightHandIndex][0].y) {
                        for(let i=0; i<d.length; i+=4) { d[i]=255-d[i]; d[i+1]=255-d[i+1]; d[i+2]=255-d[i+2]; }
                    } else {
                        for(let i=0; i<d.length; i+=4) { d[i] = d[i+40] || d[i]; d[i+2] = d[i-40] || d[i+2]; }
                    }
                    ctx.putImageData(roiData, mx1, my1);
                } catch(e) {}
            }
        }

        ctx.restore();

        // 5. Custom Navigation Bar (Draw last to be on top)
        ctx.fillStyle = "rgb(28,28,28)";
        ctx.fillRect(0, 0, canvas.width, 45);
        ctx.fillStyle = "#ccc";
        ctx.font = "14px sans-serif";
        ctx.fillText("PANTONE PRO-SCALE", 15, 28);
        [[80,80,242], [80,220,242], [120,242,80]].forEach((col, i) => {
            ctx.fillStyle = `rgb(${col[2]},${col[1]},${col[0]})`;
            ctx.beginPath(); ctx.arc(canvas.width - 60 + (i*20), 22, 6, 0, Math.PI*2); ctx.fill();
        });
        
        const drawStatus = () => {
            // ถ้าสถานะคือซ่อนอยู่ ให้ข้ามการวาด Status ไปเลย
            if (isUIHidden) return; 
        
            ctx.save();
            // ขยายพื้นหลังให้เห็นข้อมูลชัดขึ้น
            ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
            ctx.fillRect(10, 60, 260, 220); 

            ctx.fillStyle = "#00FF00";
            ctx.font = "11px monospace";
            
            // ดึงข้อมูลตรงจาก resultsFace
            const rawDet = resultsFace?.detections?.[0];
            const faceOK = !!rawDet;
            
            // เช็ค Keypoints (จมูกอยู่ที่ index 2)
            const hasKP = !!(rawDet?.locationData?.relativeKeypoints?.[2]);
            const rawBBox = rawDet?.locationData?.relativeBoundingBox;
            
            // 1. Face Debug
            ctx.fillText(`FACE_STATUS: ${faceOK ? "OK" : "LOST"}`, 20, 80);
            ctx.fillText(`BBoxW_RAW: ${rawBBox ? rawBBox.width.toFixed(4) : "NULL"}`, 20, 95);
            ctx.fillText(`NOSE_KP: ${hasKP ? "FOUND" : "MISSING"}`, 20, 110);
            
            // 2. Coordinate Debug
            ctx.fillText(`SMOOTH_X: ${prev_nx.toFixed(1)}`, 20, 130);
            ctx.fillText(`VIDEO_SIZE: ${video.videoWidth}x${video.videoHeight}`, 20, 145);

            // 3. Hand Debug
            const handsList = resultsHand?.multiHandLandmarks || [];
            ctx.fillText(`HANDS: ${handsList.length}`, 20, 165);
            
            // 4. Mode & Color
            ctx.fillText(`HEX: ${hexCode}`, 20, 185);
            let currentMode = "NORMAL";
            if (handsList.length === 2 && handsList[0]?.[0] && handsList[1]?.[0]) {
                currentMode = (handsList[0][0].y < handsList[1][0].y) ? "NEGATIVE" : "GLITCH";
            }
            ctx.fillText(`MODE: ${currentMode}`, 20, 200);

            // Version Tag
            ctx.fillStyle = "#FFFF00";
            ctx.fillText(`BUILD: v${APP_VERSION}`, 20, 220);
            ctx.restore();
        };

        drawStatus();
        
        requestAnimationFrame(process);
    }

    const camera = new Camera(video, {
        onFrame: async () => {
            await faceDetection.send({image: video});
            await hands.send({image: video});
        },
        width: 1280, height: 720
    });

    let currentSmooth = 0.95;
    let currentScaleFactor = 100;
    
    document.getElementById('smoothSlider').oninput = function() {
        currentSmooth = parseFloat(this.value);
        document.getElementById('smoothVal').innerText = this.value;
    };
    
    document.getElementById('scaleSlider').oninput = function() {
        currentScaleFactor = parseFloat(this.value);
        document.getElementById('scaleVal').innerText = this.value;
    };
    
    document.getElementById('confSlider').oninput = function() {
        const val = parseFloat(this.value);
        document.getElementById('confVal').innerText = val;
        faceDetection.setOptions({ minDetectionConfidence: val });
    };
    
    camera.start();
    video.addEventListener('loadedmetadata', process);

    const toggleBtn = document.getElementById('toggleBtn');
    const controlPanel = document.getElementById('controlPanel');
    let isUIHidden = false;
    
    toggleBtn.onclick = function() {
        isUIHidden = !isUIHidden;
        if (isUIHidden) {
            controlPanel.style.display = 'none';
            this.innerText = 'SHOW SETTINGS';
            this.style.opacity = '0.5'; // ทำให้ปุ่มดูจางลงไม่กวนตา
        } else {
            controlPanel.style.display = 'block';
            this.innerText = 'HIDE SETTINGS';
            this.style.opacity = '1';
        }
    };
    
</script>
</body>
</html>
