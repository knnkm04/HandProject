<!DOCTYPE html>
<html>
<head>
    <title>Pantone Pro-Smooth JS</title>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .window-frame { width: 360px; height: 640px; background: #000; position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #webcam { display: none; }
        #canvas { width: 100%; height: 100%; transform: rotateY(180deg); }
    </style>
</head>
<body>

<div class="window-frame">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let lastFacePos = { x: 0, y: 0 };
    let smoothFactor = 0.85;

    // --- Mediapipe Setup ---
    const faceDetection = new FaceDetection({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`});
    faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.6 });

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

    let resultsFace = null;
    let resultsHand = null;

    faceDetection.onResults(r => resultsFace = r);
    hands.onResults(r => resultsHand = r);

    async function process() {
        canvas.width = 360;
        canvas.height = 640;
        
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // วาดภาพจากกล้อง (Crop 9:16)
        ctx.drawImage(video, (video.videoWidth - (video.videoHeight * 9/16))/2, 0, video.videoHeight * 9/16, video.videoHeight, 0, 0, canvas.width, canvas.height);
        
        const avgColor = getAvgColor(ctx);
        const hexCode = rgbToHex(avgColor);

        // 1. ฟิลเตอร์มือ (2 มือ)
        if (resultsHand && resultsHand.multiHandLandmarks && resultsHand.multiHandLandmarks.length === 2) {
            applyHandFilters(ctx, resultsHand, canvas.width, canvas.height);
        }

        // 2. การ์ด Pantone บนหน้า
        if (resultsFace && resultsFace.detections.length > 0) {
            const face = resultsFace.detections[0].locationData;
            const nose = face.relativeKeypoints[2];
            
            let nx = nose.x * canvas.width;
            let ny = nose.y * canvas.height;

            lastFacePos.x = lastFacePos.x * smoothFactor + nx * (1 - smoothFactor);
            lastFacePos.y = lastFacePos.y * smoothFactor + ny * (1 - smoothFactor);

            drawPantoneCard(ctx, lastFacePos.x, lastFacePos.y, face.relativeBoundingBox.width * canvas.width, avgColor, hexCode);
        }

        // 3. วาด UI Bar (Custom Navigation)
        drawUIBar(ctx, canvas.width);

        ctx.restore();
        requestAnimationFrame(process);
    }

    function getAvgColor(context) {
        const data = context.getImageData(0, 45, 50, 50).data;
        let r=0, g=0, b=0;
        for(let i=0; i<data.length; i+=4) { r+=data[i]; g+=data[i+1]; b+=data[i+2]; }
        const count = data.length/4;
        return [Math.floor(r/count), Math.floor(g/count), Math.floor(b/count)];
    }

    function rgbToHex(rgb) {
        return "#" + rgb.map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    function drawPantoneCard(ctx, x, y, faceW, color, hex) {
        const scale = faceW / 150;
        const w = 150 * scale;
        const h = 150 * scale;
        const x1 = x - w/2, y1 = y - h/2 - (45 * scale);
        
        ctx.fillStyle = "white";
        ctx.fillRect(x1 - 5, y1 - 5, w + 10, h + 50 * scale);
        ctx.fillStyle = `rgb(${color[0]},${color[1]},${color[2]})`;
        ctx.fillRect(x1, y1, w, h);

        ctx.fillStyle = "black";
        ctx.font = `bold ${14 * scale}px Arial`;
        ctx.scale(-1, 1); // Flip text back
        ctx.fillText("PANTONE", -(x1 + 10 + w/2), y1 + h + 20 * scale);
        ctx.font = `${10 * scale}px Arial`;
        ctx.fillText(hex, -(x1 + 10 + w/2), y1 + h + 35 * scale);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    function applyHandFilters(ctx, hands, w, h) {
        const lms1 = hands.multiHandLandmarks[0];
        const lms2 = hands.multiHandLandmarks[1];
        const label1 = hands.multiHandedness[0].label;
        
        const x1 = Math.min(lms1[0].x, lms2[0].x) * w;
        const x2 = Math.max(lms1[0].x, lms2[0].x) * w;
        const y1 = Math.min(lms1[0].y, lms2[0].y) * h;
        const y2 = Math.max(lms1[0].y, lms2[0].y) * h;

        if(Math.abs(x2-x1) < 20) return;

        let imageData = ctx.getImageData(x1, y1, x2-x1, y2-y1);
        let data = imageData.data;

        const leftHandY = (label1 === 'Left') ? lms1[0].y : lms2[0].y;
        const rightHandY = (label1 === 'Right') ? lms1[0].y : lms2[0].y;

        if (leftHandY < rightHandY) { // Negative
            for(let i=0; i<data.length; i+=4) {
                data[i] = 255 - data[i]; data[i+1] = 255 - data[i+1]; data[i+2] = 255 - data[i+2];
            }
        } else { // Glitch (Simple Version)
            for(let i=0; i<data.length; i+=4) {
                if(i+8 < data.length) data[i] = data[i+8]; // Shift Red
            }
        }
        ctx.putImageData(imageData, x1, y1);
    }

    function drawUIBar(ctx, w) {
        ctx.fillStyle = "#1c1c1c";
        ctx.fillRect(0, 0, w, 45);
        ctx.fillStyle = "#ccc";
        ctx.font = "12px Arial";
        ctx.scale(-1, 1);
        ctx.fillText("PANTONE PRO-JS", -150, 28);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        
        // Window Buttons
        const btns = ["#ff5f56", "#ffbd2e", "#27c93f"];
        btns.forEach((c, i) => {
            ctx.fillStyle = c;
            ctx.beginPath(); ctx.arc(w - 20 - (i*20), 22, 6, 0, Math.PI*2); ctx.fill();
        });
    }

    const camera = new Camera(video, {
        onFrame: async () => {
            await faceDetection.send({image: video});
            await hands.send({image: video});
        },
        width: 640, height: 480
    });
    camera.start();
    video.addEventListener('loadedmetadata', process);

</script>
</body>
</html>
