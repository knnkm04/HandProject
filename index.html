<!DOCTYPE html>
<html>
<head>
    <title>Pantone Pro-Smooth JS (GitHub Edition)</title>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .window-frame { width: 360px; height: 640px; background: #000; position: relative; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #webcam { visibility: hidden; position: absolute; }
        #canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="window-frame">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const APP_VERSION = "1.3.0"; // แก้เลขตรงนี้ทุกครั้งที่ Commit/Push ขึ้น GitHub
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});

    let resultsFace = null;
    let resultsHand = null;
    let prev_nx = 0, prev_ny = 0;
    let firstFrame = true;

    // --- Mediapipe Setup ---
    const faceDetection = new FaceDetection({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
    });
    faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.6 });
    faceDetection.onResults(r => { resultsFace = r; });

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
    hands.onResults(r => { resultsHand = r; });

    // --- Logic functions ---
    function rgbToHex(r, g, b) {
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
    }

    async function process() {
        if (video.readyState < 2) { requestAnimationFrame(process); return; }
        
        canvas.width = 360;
        canvas.height = 640;

        // 1. คำนวณ Crop 9:16 (อิงจาก Python: target_w = h * 9/16)
        const videoAspect = video.videoWidth / video.videoHeight;
        const targetAspect = 9 / 16;
        let drawW, drawH, sx, sy;
        
        if (videoAspect > targetAspect) {
            drawH = video.videoHeight; drawW = drawH * targetAspect;
            sx = (video.videoWidth - drawW) / 2; sy = 0;
        } else {
            drawW = video.videoWidth; drawH = drawW / targetAspect;
            sx = 0; sy = (video.videoHeight - drawH) / 2;
        }

        ctx.save();
        // Mirror ภาพ (cv2.flip(frame, 1))
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, sx, sy, drawW, drawH, 0, 0, canvas.width, canvas.height);

        // ฟังก์ชันแปลงพิกัด (เทียบเท่าการคูณ target_w และ h ใน Python)// สูตรนี้จะทำให้พิกัด AI สอดคล้องกับภาพ Mirror บนหน้าจอ
        const fixX = (x) => canvas.width - (((x * video.videoWidth) - sx) / drawW * canvas.width);
        const fixY = (y) => ((y * video.videoHeight) - sy) / drawH * canvas.height;

        // 2. ดึงสีเฉากหลัง (ROI 0:50, 0:50)
        const sampleData = ctx.getImageData(10, 55, 30, 30).data; // ขยับลงมาใต้ Bar นิดหน่อย
        let r_sum=0, g_sum=0, b_sum=0;
        for(let i=0; i<sampleData.length; i+=4) {
            r_sum += sampleData[i]; g_sum += sampleData[i+1]; b_sum += sampleData[i+2];
        }
        const n = sampleData.length / 4;
        const avgR = Math.floor(r_sum/n), avgG = Math.floor(g_sum/n), avgB = Math.floor(b_sum/n);
        const hexCode = rgbToHex(avgR, avgG, avgB);

        // 3. วาดการ์ด Pantone (Face Detection)
        if (resultsFace && resultsFace.detections && resultsFace.detections.length > 0) {
            const det = resultsFace.detections[0];
            const kp = det.locationData?.relativeKeypoints;
            const bbox = det.locationData?.relativeBoundingBox;

            if (kp && kp[2] && bbox) {
                let nx = fixX(kp[2].x);
                let ny = fixY(kp[2].y);

                // เช็คเฟรมแรกเพื่อกระโดดไปหาพิกัดหน้าทันที
                if (firstFrame || (prev_nx === 0 && prev_ny === 0)) { 
                    prev_nx = nx; 
                    prev_ny = ny; 
                    firstFrame = false; 
                }

                // การคำนวณ Smoothing 0.85
                prev_nx = (prev_nx * 0.85) + (nx * 0.15);
                prev_ny = (prev_ny * 0.85) + (ny * 0.15);

                const scale = (bbox.width * canvas.width) / 200.0;
                const x_half = 75 * scale, y_half = 75 * scale, offset_up = 45 * scale;
                const border = 10 * scale;

                // --- วาด Pantone ---
                ctx.fillStyle = "white";
                ctx.fillRect(prev_nx - x_half - border, prev_ny - y_half - offset_up - border, (x_half*2) + (border*2), (y_half*2) + (65 * scale));
                
                ctx.fillStyle = `rgb(${avgR},${avgG},${avgB})`;
                ctx.fillRect(prev_nx - x_half, prev_ny - y_half - offset_up, x_half*2, y_half*2);

                // วาด Text (Mirror Back)
                ctx.save();
                ctx.scale(-1, 1);
                ctx.fillStyle = "black";
                ctx.font = `bold ${18 * scale}px sans-serif`;
                ctx.fillText("PANTONE", -(prev_nx - x_half + 10 * scale), prev_ny + y_half - offset_up + 25 * scale);
                ctx.restore();
            } // ปิด if (kp && kp[2] && bbox)
        } // ปิด if (resultsFace...)


        // --- 4. ฟิลเตอร์มือ (แก้ไขใหม่) ---
        if (resultsHand && resultsHand.multiHandLandmarks && resultsHand.multiHandLandmarks.length === 2) {
            const hands = resultsHand.multiHandLandmarks;
            
            // หาจุดกึ่งกลางของมือทั้งสอง (คำนวณแบบ Screen Space)
            const c0 = { x: fixX((hands[0][2].x + hands[0][5].x) / 2), y: fixY((hands[0][2].y + hands[0][5].y) / 2) };
            const c1 = { x: fixX((hands[1][2].x + hands[1][5].x) / 2), y: fixY((hands[1][2].y + hands[1][5].y) / 2) };
        
            const mx1 = Math.floor(Math.max(0, Math.min(c0.x, c1.x)));
            const mx2 = Math.floor(Math.min(canvas.width, Math.max(c0.x, c1.x)));
            const my1 = Math.floor(Math.max(0, Math.min(c0.y, c1.y)));
            const my2 = Math.floor(Math.min(canvas.height, Math.max(c0.y, c1.y)));
        
            if (mx2 - mx1 > 20 && my2 - my1 > 20) {
                try {
                    const roiData = ctx.getImageData(mx1, my1, mx2 - mx1, my2 - my1);
                    const d = roiData.data;
        
                    // เทียบจากพิกัด X: ใครอยู่เลขน้อยกว่า (ซ้ายจอ)
                    const leftHandIndex = c0.x < c1.x ? 0 : 1;
                    const rightHandIndex = c0.x < c1.x ? 1 : 0;
        
                    // เช็คความสูง (Y): ถ้ามือที่อยู่ฝั่งซ้ายจอ อยู่สูงกว่ามือฝั่งขวาจอ
                    if (hands[leftHandIndex][0].y < hands[rightHandIndex][0].y) {
                        for(let i=0; i<d.length; i+=4) { d[i]=255-d[i]; d[i+1]=255-d[i+1]; d[i+2]=255-d[i+2]; }
                    } else {
                        for(let i=0; i<d.length; i+=4) { d[i] = d[i+40] || d[i]; d[i+2] = d[i-40] || d[i+2]; }
                    }
                    ctx.putImageData(roiData, mx1, my1);
                } catch(e) {}
            }
        }

        ctx.restore();

        // 5. Custom Navigation Bar (Draw last to be on top)
        ctx.fillStyle = "rgb(28,28,28)";
        ctx.fillRect(0, 0, canvas.width, 45);
        ctx.fillStyle = "#ccc";
        ctx.font = "14px sans-serif";
        ctx.fillText("PANTONE PRO-SCALE", 15, 28);
        [[80,80,242], [80,220,242], [120,242,80]].forEach((col, i) => {
            ctx.fillStyle = `rgb(${col[2]},${col[1]},${col[0]})`;
            ctx.beginPath(); ctx.arc(canvas.width - 60 + (i*20), 22, 6, 0, Math.PI*2); ctx.fill();
        });
        
        const drawStatus = () => {
            ctx.save();
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(10, 60, 220, 160);

            ctx.fillStyle = "#00FF00";
            ctx.font = "11px monospace";
            
            // 1. Face Check - ใช้ ?. ทุกจุดเพื่อป้องกัน Error ล้มละลาย
            const det = resultsFace?.detections?.[0];
            const faceFound = !!det; // แปลงเป็น true/false
            
            // ถ้ามี det ให้ดึงค่า width ถ้าไม่มีให้เป็น "0.00"
            const bboxW = det?.locationData?.relativeBoundingBox?.width?.toFixed(2) || "0.00";
            
            ctx.fillText(`FACE: ${faceFound ? "OK" : "LOST"} (BBoxW: ${bboxW})`, 20, 80);
            ctx.fillText(`SMOOTH_X: ${prev_nx.toFixed(1)}`, 20, 95);
        
            // 2. Hand Check
            const hands = resultsHand?.multiHandLandmarks || [];
            ctx.fillText(`HANDS DETECTED: ${hands.length}`, 20, 115);
            if (hands.length === 2) {
                const y0 = hands[0]?.[0]?.y?.toFixed(2) || "0.0";
                const y1 = hands[1]?.[0]?.y?.toFixed(2) || "0.0";
                ctx.fillText(`Y-POS: H0:${y0} | H1:${y1}`, 20, 130);
            }
        
            // 3. Status อื่นๆ
            ctx.fillText(`COLOR: ${hexCode}`, 20, 150);
            ctx.fillText(`SCREEN: ${canvas.width}x${canvas.height}`, 20, 165);
            
            let mode = "NORMAL";
            if (hands.length === 2 && hands[0]?.[0] && hands[1]?.[0]) {
                mode = (hands[0][0].y < hands[1][0].y) ? "NEGATIVE" : "GLITCH";
            }
            ctx.fillText(`SYSTEM MODE: ${mode}`, 20, 185);
            
            ctx.fillStyle = "#FFFF00";
            ctx.fillText(`BUILD: v${APP_VERSION}`, 20, 205);
            ctx.restore();
        };

        drawStatus();
        
        requestAnimationFrame(process);
    }

    const camera = new Camera(video, {
        onFrame: async () => {
            await faceDetection.send({image: video});
            await hands.send({image: video});
        },
        width: 1280, height: 720
    });
    camera.start();
    video.addEventListener('loadedmetadata', process);
</script>
</body>
</html>
